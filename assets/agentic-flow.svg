<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agentic full-stack delivery flow</title>
  <desc id="desc">Animated visual flow from product interface to backend APIs, agent runtime, retrieval, events, cloud, and observability.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#060A16"/>
      <stop offset="0.5" stop-color="#0B2438"/>
      <stop offset="1" stop-color="#24154F"/>
    </linearGradient>
    <linearGradient id="line" x1="115" y1="223" x2="1080" y2="223" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 215) rotate(90) scale(260 540)">
      <stop stop-color="#38BDF8" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { font: 800 19px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; }
      .small { font: 600 13px Inter, Segoe UI, Arial, sans-serif; fill: #B9D7FF; }
      .eyebrow { font: 800 15px Inter, Segoe UI, Arial, sans-serif; fill: #67E8F9; letter-spacing: 1.8px; }
      .pill { font: 700 12px Inter, Segoe UI, Arial, sans-serif; fill: #E2E8F0; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
      .pulse2 { animation: pulse 2.4s ease-in-out infinite; animation-delay: .45s; transform-origin: center; }
      .pulse3 { animation: pulse 2.4s ease-in-out infinite; animation-delay: .9s; transform-origin: center; }
      .dash { stroke-dasharray: 14 12; animation: dash 7s linear infinite; }
      @keyframes pulse { 0%, 100% { opacity: .72; transform: scale(1); } 50% { opacity: 1; transform: scale(1.04); } }
      @keyframes dash { to { stroke-dashoffset: -180; } }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="430" rx="30" fill="url(#panel)"/>
  <rect x="0" y="0" width="1200" height="430" rx="30" fill="url(#nodeGlow)"/>
  <path d="M86 223 H1114" stroke="url(#line)" stroke-width="4" stroke-linecap="round" class="dash" opacity="0.75"/>

  <text x="58" y="58" class="eyebrow">AI-NATIVE FULL-STACK DELIVERY MAP</text>
  <text x="58" y="91" class="small">Product taste at the surface. Production truth underneath. Agents connected through secure tools, retrieval, events, and observability.</text>

  <g class="pulse">
    <rect x="60" y="150" width="168" height="146" rx="24" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.5"/>
    <circle cx="144" cy="190" r="24" fill="#38BDF8" fill-opacity="0.16" stroke="#38BDF8"/>
    <text x="94" y="236" class="label">Product UI</text>
    <text x="86" y="262" class="small">React . Next . Expo</text>
  </g>

  <g class="pulse2">
    <rect x="260" y="150" width="168" height="146" rx="24" fill="#0F172A" stroke="#22C55E" stroke-opacity="0.48"/>
    <circle cx="344" cy="190" r="24" fill="#22C55E" fill-opacity="0.14" stroke="#22C55E"/>
    <text x="303" y="236" class="label">APIs</text>
    <text x="286" y="262" class="small">Django . FastAPI</text>
    <text x="294" y="281" class="small">Spring . Express</text>
  </g>

  <g class="pulse3">
    <rect x="460" y="132" width="220" height="182" rx="28" fill="#111827" stroke="#A78BFA" stroke-opacity="0.58"/>
    <circle cx="570" cy="182" r="30" fill="#A78BFA" fill-opacity="0.18" stroke="#A78BFA"/>
    <text x="512" y="236" class="label">Agent Runtime</text>
    <text x="498" y="263" class="small">Agents SDK . LangGraph</text>
    <text x="521" y="283" class="small">MCP . tools . evals</text>
  </g>

  <g class="pulse2">
    <rect x="712" y="150" width="168" height="146" rx="24" fill="#0F172A" stroke="#F59E0B" stroke-opacity="0.48"/>
    <circle cx="796" cy="190" r="24" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B"/>
    <text x="747" y="236" class="label">Retrieval</text>
    <text x="742" y="262" class="small">pgvector . RAG</text>
    <text x="738" y="281" class="small">OpenSearch . data</text>
  </g>

  <g class="pulse">
    <rect x="912" y="150" width="228" height="146" rx="24" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.5"/>
    <circle cx="1026" cy="190" r="24" fill="#38BDF8" fill-opacity="0.16" stroke="#38BDF8"/>
    <text x="963" y="236" class="label">Production Spine</text>
    <text x="956" y="262" class="small">Kafka . RabbitMQ . Redis</text>
    <text x="964" y="281" class="small">AWS . K8s . telemetry</text>
  </g>

  <g>
    <rect x="146" y="344" width="118" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.09"/>
    <text x="171" y="365" class="pill">Auth</text>
    <rect x="282" y="344" width="118" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.09"/>
    <text x="309" y="365" class="pill">Queues</text>
    <rect x="418" y="344" width="118" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.09"/>
    <text x="445" y="365" class="pill">Memory</text>
    <rect x="554" y="344" width="118" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.09"/>
    <text x="584" y="365" class="pill">Evals</text>
    <rect x="690" y="344" width="118" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.09"/>
    <text x="718" y="365" class="pill">Tracing</text>
    <rect x="826" y="344" width="150" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.09"/>
    <text x="854" y="365" class="pill">Guardrails</text>
  </g>
</svg>

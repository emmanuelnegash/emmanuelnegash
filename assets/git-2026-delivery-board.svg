<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">2026 Git and GitHub delivery board</title>
  <desc id="desc">A clean 2026 GitHub delivery diagram showing issue, branch, commit, pull request, CI, release, and stars.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06111F"/>
      <stop offset="0.52" stop-color="#0A2A39"/>
      <stop offset="1" stop-color="#171A2E"/>
    </linearGradient>
    <linearGradient id="rail" x1="98" y1="228" x2="1104" y2="228" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="0.3" stop-color="#38BDF8"/>
      <stop offset="0.62" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .eyebrow { font: 800 16px Inter, Segoe UI, Arial, sans-serif; fill: #67E8F9; }
      .title { font: 850 34px Inter, Segoe UI, Arial, sans-serif; fill: #FFFFFF; }
      .subtitle { font: 600 15px Inter, Segoe UI, Arial, sans-serif; fill: #B8D4E8; }
      .step { font: 850 17px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; }
      .small { font: 650 12px Inter, Segoe UI, Arial, sans-serif; fill: #B8D4E8; }
      .chip { font: 800 11px Inter, Segoe UI, Arial, sans-serif; fill: #E2E8F0; }
      .dash { stroke-dasharray: 14 12; animation: dash 10s linear infinite; }
      .pulse { animation: pulse 2.6s ease-in-out infinite; transform-origin: center; }
      @keyframes dash { to { stroke-dashoffset: -156; } }
      @keyframes pulse { 0%, 100% { opacity: .78; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }
    </style>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#panel)"/>
  <path d="M-20 276 C126 210 244 295 406 238 C584 176 693 120 879 156 C1021 184 1106 234 1220 188" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="70"/>
  <path d="M-16 94 C150 141 282 72 446 112 C613 153 685 229 868 205 C1012 185 1090 94 1220 118" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="48"/>

  <text x="58" y="60" class="eyebrow">JANUARY 2026 FORWARD</text>
  <text x="58" y="104" class="title">GitHub delivery board</text>
  <text x="58" y="134" class="subtitle">A simple public signal: focused work, readable commits, reviewable pull requests, checks, releases, and community attention.</text>

  <path class="dash" d="M116 228 H1084" stroke="url(#rail)" stroke-width="6" stroke-linecap="round"/>
  <path d="M116 228 H1084" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="14" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <g transform="translate(58 174)">
      <rect width="142" height="120" rx="18" fill="#0E1F2C" stroke="#22C55E" stroke-opacity="0.42"/>
      <circle class="pulse" cx="71" cy="34" r="16" fill="#22C55E"/>
      <text x="47" y="67" class="step">Issue</text>
      <text x="31" y="90" class="small">scope</text>
      <text x="70" y="90" class="small">first</text>
    </g>

    <g transform="translate(217 174)">
      <rect width="142" height="120" rx="18" fill="#0E1F2C" stroke="#38BDF8" stroke-opacity="0.42"/>
      <circle cx="71" cy="34" r="16" fill="#38BDF8"/>
      <text x="43" y="67" class="step">Branch</text>
      <text x="28" y="90" class="small">one clear</text>
      <text x="84" y="90" class="small">path</text>
    </g>

    <g transform="translate(376 174)">
      <rect width="142" height="120" rx="18" fill="#0E1F2C" stroke="#FDE047" stroke-opacity="0.42"/>
      <circle class="pulse" cx="71" cy="34" r="16" fill="#FDE047"/>
      <text x="39" y="67" class="step">Commit</text>
      <text x="26" y="90" class="small">small readable</text>
      <text x="52" y="108" class="small">changes</text>
    </g>

    <g transform="translate(535 174)">
      <rect width="142" height="120" rx="18" fill="#0E1F2C" stroke="#A78BFA" stroke-opacity="0.42"/>
      <circle cx="71" cy="34" r="16" fill="#A78BFA"/>
      <text x="60" y="67" class="step">PR</text>
      <text x="30" y="90" class="small">reviewable</text>
      <text x="48" y="108" class="small">work</text>
    </g>

    <g transform="translate(694 174)">
      <rect width="142" height="120" rx="18" fill="#0E1F2C" stroke="#34D399" stroke-opacity="0.42"/>
      <circle class="pulse" cx="71" cy="34" r="16" fill="#34D399"/>
      <text x="61" y="67" class="step">CI</text>
      <text x="40" y="90" class="small">tests and</text>
      <text x="43" y="108" class="small">checks</text>
    </g>

    <g transform="translate(853 174)">
      <rect width="142" height="120" rx="18" fill="#0E1F2C" stroke="#FB7185" stroke-opacity="0.42"/>
      <circle cx="71" cy="34" r="16" fill="#FB7185"/>
      <text x="36" y="67" class="step">Release</text>
      <text x="30" y="90" class="small">ship and</text>
      <text x="50" y="108" class="small">watch</text>
    </g>

    <g transform="translate(1012 174)">
      <rect width="142" height="120" rx="18" fill="#0E1F2C" stroke="#F59E0B" stroke-opacity="0.42"/>
      <circle class="pulse" cx="71" cy="34" r="16" fill="#F59E0B"/>
      <text x="49" y="67" class="step">Stars</text>
      <text x="23" y="90" class="small">community</text>
      <text x="50" y="108" class="small">signal</text>
    </g>
  </g>

  <g transform="translate(58 314)">
    <rect width="186" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="24" y="20" class="chip">Git discipline</text>
    <rect x="204" width="228" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="228" y="20" class="chip">GitHub collaboration</text>
    <rect x="450" width="202" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="474" y="20" class="chip">Pull requests and CI</text>
    <rect x="670" width="218" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="694" y="20" class="chip">Stars as public signal</text>
  </g>
</svg>

<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Selected project portfolio for Amanuel Negash Tiruneh</title>
  <desc id="desc">A selective visual portfolio showing professional platforms and product-lab projects across AI, backend, cloud, data, mobile, and civic systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06111F"/>
      <stop offset="0.48" stop-color="#0B2633"/>
      <stop offset="1" stop-color="#191B32"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#102A3A"/>
      <stop offset="1" stop-color="#0D1727"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#17243A"/>
      <stop offset="1" stop-color="#101322"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .eyebrow { font: 800 16px Inter, Segoe UI, Arial, sans-serif; fill: #67E8F9; letter-spacing: 0; }
      .title { font: 850 36px Inter, Segoe UI, Arial, sans-serif; fill: #FFFFFF; letter-spacing: 0; }
      .subtitle { font: 600 16px Inter, Segoe UI, Arial, sans-serif; fill: #B8D4E8; }
      .section { font: 800 14px Inter, Segoe UI, Arial, sans-serif; fill: #93C5FD; }
      .name { font: 800 21px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; }
      .copy { font: 600 14px Inter, Segoe UI, Arial, sans-serif; fill: #C7DBEA; }
      .tag { font: 800 12px Inter, Segoe UI, Arial, sans-serif; fill: #E2E8F0; }
      .metric { font: 850 22px Inter, Segoe UI, Arial, sans-serif; fill: #FDE68A; }
      .metricLabel { font: 700 12px Inter, Segoe UI, Arial, sans-serif; fill: #A7F3D0; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="28" fill="url(#bg)"/>
  <path d="M-40 582 C143 494 260 650 457 545 C657 438 785 238 1038 281 C1118 295 1171 326 1240 290" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="82"/>
  <path d="M-20 160 C170 234 308 68 520 139 C734 211 823 367 1038 306 C1122 282 1176 221 1240 220" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="64"/>

  <text x="58" y="62" class="eyebrow">SELECTED PROJECT PORTFOLIO</text>
  <text x="58" y="108" class="title">Systems that show range without noise</text>
  <text x="58" y="140" class="subtitle">Professional platforms, product-lab builds, and public repositories chosen for AI, backend, cloud, data, and product depth.</text>

  <g transform="translate(58 188)" filter="url(#soft)">
    <rect width="342" height="210" rx="18" fill="url(#cardA)" stroke="#38BDF8" stroke-opacity="0.28"/>
    <text x="24" y="34" class="section">PROFESSIONAL PLATFORM</text>
    <text x="24" y="68" class="name">Farmer.Chat / FarmchatAI</text>
    <text x="24" y="99" class="copy">AI advisory platform with resilient</text>
    <text x="24" y="120" class="copy">cloud delivery, analytics, and</text>
    <text x="24" y="141" class="copy">cost-aware production operations.</text>
    <text x="24" y="178" class="metric">1M+ users</text>
    <text x="142" y="178" class="metricLabel">FastAPI . Node . AWS . Next.js</text>
  </g>

  <g transform="translate(429 188)" filter="url(#soft)">
    <rect width="342" height="210" rx="18" fill="url(#cardB)" stroke="#A78BFA" stroke-opacity="0.28"/>
    <text x="24" y="34" class="section">DISTRIBUTED BACKEND</text>
    <text x="24" y="68" class="name">FarmStack data exchange</text>
    <text x="24" y="99" class="copy">Microservices for partner data</text>
    <text x="24" y="120" class="copy">exchange, secure APIs, queues,</text>
    <text x="24" y="141" class="copy">search, and observability.</text>
    <text x="24" y="178" class="metric">Interop</text>
    <text x="124" y="178" class="metricLabel">Java . Python . Kafka . RabbitMQ</text>
  </g>

  <g transform="translate(800 188)" filter="url(#soft)">
    <rect width="342" height="210" rx="18" fill="url(#cardA)" stroke="#34D399" stroke-opacity="0.28"/>
    <text x="24" y="34" class="section">OFFLINE-FIRST SYSTEM</text>
    <text x="24" y="68" class="name">Farmer Registry Platform</text>
    <text x="24" y="99" class="copy">Field-ready registry workflows</text>
    <text x="24" y="120" class="copy">with sync, secure roles, audit</text>
    <text x="24" y="141" class="copy">logging, and resilient APIs.</text>
    <text x="24" y="178" class="metric">Field data</text>
    <text x="146" y="178" class="metricLabel">Django . Redis . Celery . AWS</text>
  </g>

  <g transform="translate(58 438)" filter="url(#soft)">
    <rect width="342" height="210" rx="18" fill="url(#cardB)" stroke="#F59E0B" stroke-opacity="0.3"/>
    <text x="24" y="34" class="section">AI PRODUCT LAB</text>
    <text x="24" y="68" class="name">Etharon assistant</text>
    <text x="24" y="99" class="copy">Agentic assistant architecture with</text>
    <text x="24" y="120" class="copy">workflow state, approvals, queues,</text>
    <text x="24" y="141" class="copy">outbox, and recovery paths.</text>
    <text x="24" y="178" class="metric">Agentic</text>
    <text x="126" y="178" class="metricLabel">TypeScript . Postgres . BullMQ</text>
  </g>

  <g transform="translate(429 438)" filter="url(#soft)">
    <rect width="342" height="210" rx="18" fill="url(#cardA)" stroke="#FB7185" stroke-opacity="0.3"/>
    <text x="24" y="34" class="section">PRODUCT LAB</text>
    <text x="24" y="68" class="name">Logistics pricing platform</text>
    <text x="24" y="99" class="copy">Quote engine, mobile workflow,</text>
    <text x="24" y="120" class="copy">pricing parity checks, maps,</text>
    <text x="24" y="141" class="copy">weather, and production API work.</text>
    <text x="24" y="178" class="metric">Pricing</text>
    <text x="124" y="178" class="metricLabel">FastAPI . Expo . PostGIS . Railway</text>
  </g>

  <g transform="translate(800 438)" filter="url(#soft)">
    <rect width="342" height="210" rx="18" fill="url(#cardB)" stroke="#22C55E" stroke-opacity="0.3"/>
    <text x="24" y="34" class="section">CIVIC + COMMUNITY SYSTEMS</text>
    <text x="24" y="68" class="name">Evidence and finance tools</text>
    <text x="24" y="99" class="copy">Operational dashboards, public</text>
    <text x="24" y="120" class="copy">readiness gates, approvals, and</text>
    <text x="24" y="141" class="copy">community-finance workflows.</text>
    <text x="24" y="178" class="metric">Trust</text>
    <text x="102" y="178" class="metricLabel">Next.js . Java . Oracle . CI/CD</text>
  </g>

  <g transform="translate(58 690)">
    <rect width="1084" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.13"/>
    <text x="24" y="23" class="tag">Pattern: product thinking + backend depth + cloud delivery + AI workflows + readable engineering artifacts.</text>
  </g>
</svg>
